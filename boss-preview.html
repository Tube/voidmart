<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>html,body{margin:0;background:#0a0a1c;font-family:system-ui}</style></head>
<body>
<canvas id="c" width="560" height="360"></canvas>
<script src="src/core.js?f=1"></script>
<script src="src/enemies.js?f=1"></script>
<script>
  const TD=window.TD, M=TD.math, W=560,H=360;
  TD.Screen.unit=2.6; TD.Screen.W=W; TD.Screen.H=H;
  const ctx=document.getElementById("c").getContext("2d");
  ctx.fillStyle="#0a0a1c"; ctx.fillRect(0,0,W,H);
  function show(type,cx,cy,label){ const def=TD.ENEMIES[type];
    const e={type,def,x:cx,y:cy,vx:0,vy:0,ang:0,face:0,dead:false,t:0,hpScale:1,hp:500,maxHp:500};
    def.spawn(e); e.ang=0; e.face=0;
    ctx.save(); ctx.translate(cx,cy); try{def.draw(e,ctx);}catch(err){} ctx.restore();
    ctx.fillStyle="#fff"; ctx.font="700 15px system-ui"; ctx.textAlign="center"; ctx.fillText(label,cx,cy+100); }
  show("bulwark", 150, 160, "Mega-Pallet");
  show("crusher", 410, 160, "Clearance Crusher");
</script>
</body></html>
